# nextin — BoostNet 托管配置(可直接当订阅/配置文件导入)
# 使用前必做: 把 proxy-providers.BoostNet.url 换成你自己的 BoostNet 订阅链接
# ⚠️ 本仓库是公开的,填入真实订阅链接后请勿 push 到 GitHub,本地导入即可

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
unified-delay: true

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "+.local"
  nameserver:
    - https://223.5.5.5/dns-query
    - https://120.53.53.53/dns-query

proxy-providers:
  BoostNet:
    type: http
    url: "在这里粘贴你的BoostNet订阅链接"
    path: ./providers/boostnet.yaml
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

proxy-groups:
  - name: 🚀 节点选择
    type: select
    use:
      - BoostNet

